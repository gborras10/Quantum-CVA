<svg width="1200" height="260" viewBox="0 0 1200 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Quantum-CVA</title>
  <desc id="desc">Minimal animated cover for Quantum-CVA.</desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1200" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.52" stop-color="#111827"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>

    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 130) scale(520 150)">
      <stop stop-color="#60a5fa" stop-opacity="0.24"/>
      <stop offset="0.52" stop-color="#2dd4bf" stop-opacity="0.09"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="wordmark" x1="292" y1="102" x2="908" y2="102" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.58" stop-color="#dbeafe"/>
      <stop offset="1" stop-color="#99f6e4"/>
    </linearGradient>

    <linearGradient id="lineGradient" x1="190" y1="0" x2="1010" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="0.48" stop-color="#38bdf8" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-240 0;240 0;-240 0" dur="7s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="circuitGradient" x1="0" y1="0" x2="540" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="0.38" stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#7dd3fc" stop-opacity="1"/>
      <stop offset="0.58" stop-color="#5eead4" stop-opacity="0.95"/>
      <stop offset="0.72" stop-color="#2dd4bf" stop-opacity="0"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-620 0;620 0" dur="7s" repeatCount="indefinite"/>
    </linearGradient>

    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#020617" flood-opacity="0.38"/>
    </filter>

    <filter id="circuitGlow" x="-8%" y="-45%" width="116%" height="190%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .bg { fill: url(#background); }
      .frame {
        fill: rgba(15, 23, 42, 0.58);
        stroke: rgba(148, 163, 184, 0.22);
        stroke-width: 1;
      }
      .wordmark {
        font-family: ui-sans-serif, Inter, "SF Pro Display", "Segoe UI", Arial, sans-serif;
        font-size: 78px;
        font-weight: 820;
        letter-spacing: 0;
        font-kerning: normal;
        font-feature-settings: "kern" 1, "liga" 1, "calt" 1;
        font-variation-settings: "wght" 820, "opsz" 72;
        fill: url(#wordmark);
      }
      .subtitle {
        font-family: ui-sans-serif, Inter, "SF Pro Text", "Segoe UI", Arial, sans-serif;
        font-size: 18px;
        font-weight: 520;
        letter-spacing: 0.2px;
        fill: #cbd5e1;
      }
      .rule { stroke: url(#lineGradient); stroke-width: 1.8; stroke-linecap: round; }
      .orbit { fill: none; stroke: #94a3b8; stroke-width: 1; stroke-opacity: 0.18; }
      .dot { fill: #7dd3fc; }
      .dotAlt { fill: #5eead4; }
      .quantumWire { stroke: #94a3b8; stroke-width: 1.15; stroke-linecap: round; stroke-opacity: 0.2; }
      .quantumPulse {
        stroke: url(#circuitGradient);
        stroke-width: 2.2;
        stroke-linecap: round;
        stroke-opacity: 0.92;
        filter: url(#circuitGlow);
      }
      .quantumGate {
        fill: rgba(15, 23, 42, 0.62);
        stroke: #7dd3fc;
        stroke-width: 1;
        stroke-opacity: 0.24;
      }
      .quantumGateGlow {
        fill: rgba(45, 212, 191, 0.08);
        stroke: url(#circuitGradient);
        stroke-width: 1.8;
        filter: url(#circuitGlow);
      }
      .quantumControlGlow {
        fill: none;
        stroke: url(#circuitGradient);
        stroke-width: 1.8;
        filter: url(#circuitGlow);
      }
      .quantumDotGlow {
        fill: #7dd3fc;
        filter: url(#circuitGlow);
      }
      .quantumGateText {
        font-family: ui-monospace, "SF Mono", "Cascadia Mono", Consolas, monospace;
        font-size: 10px;
        font-weight: 700;
        fill: #cbd5e1;
        opacity: 0.34;
      }
      .quantumGateTextGlow {
        font-family: ui-monospace, "SF Mono", "Cascadia Mono", Consolas, monospace;
        font-size: 10px;
        font-weight: 700;
        fill: #ecfeff;
        filter: url(#circuitGlow);
      }

      @media (prefers-reduced-motion: reduce) {
        animate, animateTransform, animateMotion { display: none; }
      }
    </style>
  </defs>

  <rect class="bg" width="1200" height="260" rx="0"/>
  <rect width="1200" height="260" fill="url(#glow)"/>

  <g filter="url(#shadow)">
    <rect class="frame" x="48" y="30" width="1104" height="200" rx="26"/>
  </g>

  <g opacity="0.72">
    <ellipse class="orbit" cx="600" cy="128" rx="338" ry="52"/>
    <ellipse class="orbit" cx="600" cy="128" rx="338" ry="52" transform="rotate(-8 600 128)"/>
    <circle class="dot" cx="282" cy="128" r="3.5">
      <animate attributeName="opacity" values="0.25;0.9;0.25" dur="4.8s" repeatCount="indefinite"/>
    </circle>
    <circle class="dotAlt" cx="918" cy="128" r="3.5">
      <animate attributeName="opacity" values="0.9;0.25;0.9" dur="4.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g transform="translate(330 180)" opacity="0.5">
    <animate attributeName="opacity" values="0.32;0.92;0.32" dur="7s" repeatCount="indefinite"/>
    <path class="quantumWire" d="M0 0H540"/>
    <path class="quantumWire" d="M0 24H540"/>
    <path class="quantumWire" d="M0 48H540"/>
    <path class="quantumPulse" d="M0 0H540">
      <animate attributeName="stroke-opacity" values="0.18;1;0.18" dur="7s" repeatCount="indefinite"/>
    </path>
    <path class="quantumPulse" d="M0 24H540">
      <animate attributeName="stroke-opacity" values="0.24;1;0.24" dur="7s" begin="0.35s" repeatCount="indefinite"/>
    </path>
    <path class="quantumPulse" d="M0 48H540">
      <animate attributeName="stroke-opacity" values="0.18;1;0.18" dur="7s" begin="0.7s" repeatCount="indefinite"/>
    </path>
    <rect class="quantumGate" x="72" y="-12" width="30" height="24" rx="6"/>
    <text class="quantumGateText" x="87" y="4" text-anchor="middle">H</text>
    <rect class="quantumGate" x="154" y="12" width="38" height="24" rx="6"/>
    <text class="quantumGateText" x="173" y="28" text-anchor="middle">Ry</text>
    <line x1="252" y1="0" x2="252" y2="48" stroke="#7dd3fc" stroke-width="1" stroke-opacity="0.2"/>
    <circle cx="252" cy="0" r="3.2" fill="#7dd3fc" opacity="0.28"/>
    <circle cx="252" cy="48" r="7.2" fill="none" stroke="#7dd3fc" stroke-width="1" stroke-opacity="0.24"/>
    <path d="M245 48H259M252 41V55" stroke="#7dd3fc" stroke-width="1" stroke-opacity="0.24"/>
    <rect class="quantumGate" x="336" y="12" width="38" height="24" rx="6"/>
    <text class="quantumGateText" x="355" y="28" text-anchor="middle">U</text>
    <rect class="quantumGate" x="436" y="36" width="30" height="24" rx="6"/>
    <text class="quantumGateText" x="451" y="52" text-anchor="middle">M</text>
    <rect class="quantumGateGlow" x="72" y="-12" width="30" height="24" rx="6" opacity="0.12">
      <animate attributeName="opacity" values="0.08;0.98;0.08" dur="7s" begin="0.8s" repeatCount="indefinite"/>
    </rect>
    <text class="quantumGateTextGlow" x="87" y="4" text-anchor="middle" opacity="0.12">H<animate attributeName="opacity" values="0.08;1;0.08" dur="7s" begin="0.8s" repeatCount="indefinite"/></text>
    <rect class="quantumGateGlow" x="154" y="12" width="38" height="24" rx="6" opacity="0.12">
      <animate attributeName="opacity" values="0.08;0.98;0.08" dur="7s" begin="1.8s" repeatCount="indefinite"/>
    </rect>
    <text class="quantumGateTextGlow" x="173" y="28" text-anchor="middle" opacity="0.12">Ry<animate attributeName="opacity" values="0.08;1;0.08" dur="7s" begin="1.8s" repeatCount="indefinite"/></text>
    <line class="quantumControlGlow" x1="252" y1="0" x2="252" y2="48" opacity="0.1">
      <animate attributeName="opacity" values="0.06;0.9;0.06" dur="7s" begin="3s" repeatCount="indefinite"/>
    </line>
    <circle class="quantumDotGlow" cx="252" cy="0" r="3.4" opacity="0.12">
      <animate attributeName="opacity" values="0.08;0.98;0.08" dur="7s" begin="3s" repeatCount="indefinite"/>
    </circle>
    <circle class="quantumControlGlow" cx="252" cy="48" r="7.2" opacity="0.1">
      <animate attributeName="opacity" values="0.06;0.9;0.06" dur="7s" begin="3s" repeatCount="indefinite"/>
    </circle>
    <path class="quantumControlGlow" d="M245 48H259M252 41V55" opacity="0.1">
      <animate attributeName="opacity" values="0.06;0.9;0.06" dur="7s" begin="3s" repeatCount="indefinite"/>
    </path>
    <rect class="quantumGateGlow" x="336" y="12" width="38" height="24" rx="6" opacity="0.12">
      <animate attributeName="opacity" values="0.08;0.98;0.08" dur="7s" begin="4.1s" repeatCount="indefinite"/>
    </rect>
    <text class="quantumGateTextGlow" x="355" y="28" text-anchor="middle" opacity="0.12">U<animate attributeName="opacity" values="0.08;1;0.08" dur="7s" begin="4.1s" repeatCount="indefinite"/></text>
    <rect class="quantumGateGlow" x="436" y="36" width="30" height="24" rx="6" opacity="0.12">
      <animate attributeName="opacity" values="0.08;0.98;0.08" dur="7s" begin="5.4s" repeatCount="indefinite"/>
    </rect>
    <text class="quantumGateTextGlow" x="451" y="52" text-anchor="middle" opacity="0.12">M<animate attributeName="opacity" values="0.08;1;0.08" dur="7s" begin="5.4s" repeatCount="indefinite"/></text>
  </g>

  <line class="rule" x1="214" y1="58" x2="986" y2="58"/>
  <line class="rule" x1="214" y1="204" x2="986" y2="204"/>

  <text class="wordmark" x="600" y="126" text-anchor="middle">Quantum-CVA</text>
  <text class="subtitle" x="600" y="162" text-anchor="middle">A research toolkit for quantum credit valuation analysis</text>
</svg>
